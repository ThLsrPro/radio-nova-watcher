<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Nova Watcher</title>
<style>
/* ── Variables ───────────────────────────────────────────────────────────── */
:root {
  --bg-primary:   #f8f9fa;
  --bg-secondary: #ffffff;
  --bg-card:      #ffffff;
  --text-primary: #1c1c1e;
  --text-secondary: #6e6e73;
  --accent:   #E8003D;
  --border:   #e8e8ed;
  --success:  #34c759;
  --warning:  #ff9f0a;
  --shadow:   rgba(0,0,0,.08);
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  --mono: "SF Mono", "Monaco", "Courier New", monospace;
  --radius: 12px;
  --radius-sm: 8px;
}
[data-theme="dark"] {
  --bg-primary:   #1c1c1e;
  --bg-secondary: #2c2c2e;
  --bg-card:      #2c2c2e;
  --text-primary: #f5f5f7;
  --text-secondary: #98989d;
  --accent:  #ff375f;
  --border:  #3a3a3c;
  --success: #32d74b;
  --warning: #ffd60a;
  --shadow:  rgba(0,0,0,.3);
}

/* ── Reset ───────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg-primary);color:var(--text-primary);
  font-family:var(--font);font-size:15px;line-height:1.6;
  transition:background .3s,color .3s;min-height:100vh;
}
a{color:var(--text-secondary);text-decoration:none}
a:hover{color:var(--text-primary)}
button{cursor:pointer;font-family:inherit}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.container{max-width:920px;margin:0 auto;padding:0 20px 80px}

/* ── Header ──────────────────────────────────────────────────────────────── */
header{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  padding:12px 0;
  position:sticky;top:0;z-index:100;
  transition:background .3s;
}
.header-inner{
  max-width:920px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-logo{flex-shrink:0;width:30px;height:30px}
.brand-text h1{
  font-size:.98rem;font-weight:600;color:var(--text-primary);
  white-space:nowrap;letter-spacing:-.01em;
}
.brand-text p{font-size:.7rem;color:var(--text-secondary);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

.session-badge{
  display:flex;align-items:center;gap:5px;
  font-size:.73rem;font-weight:500;
  padding:4px 10px;border-radius:20px;
  background:var(--bg-primary);border:1px solid var(--border);
  color:var(--text-secondary);
}
.session-badge.live{
  background:rgba(232,0,61,.07);border-color:rgba(232,0,61,.2);
  color:var(--accent);
}
.live-pulse{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  animation:pulse-dot 1.4s infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

.btn-theme{
  background:none;border:none;color:var(--text-secondary);
  width:30px;height:30px;font-size:.88rem;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:background .15s,color .15s;
}
.btn-theme:hover{background:var(--bg-primary);color:var(--text-primary)}

.btn-refresh{
  background:none;color:var(--accent);border:1px solid var(--accent);
  border-radius:6px;padding:4px 11px;
  font-size:.76rem;font-weight:500;
  transition:background .15s;
}
.btn-refresh:hover{background:rgba(232,0,61,.05)}

/* ── Navbar ──────────────────────────────────────────────────────────────── */
nav{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  position:sticky;top:55px;z-index:90;
  overflow-x:auto;white-space:nowrap;
  transition:background .3s;
}
nav::-webkit-scrollbar{height:0}
.nav-inner{
  max-width:920px;margin:0 auto;padding:0 20px;
  display:flex;gap:0;
}
.nav-link{
  padding:9px 14px;font-size:.81rem;font-weight:500;
  color:var(--text-secondary);border:none;background:none;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.nav-link:hover{color:var(--text-primary)}
.nav-link.active{color:var(--text-primary);border-bottom-color:var(--accent)}

/* ── Skeleton ────────────────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--border) 25%,var(--bg-secondary) 50%,var(--border) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:var(--radius-sm);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:10px;
}
.sk-line{height:12px;margin-bottom:10px}
.sk-line-short{height:12px;width:55%;margin-bottom:10px}
.sk-circle{width:38px;height:38px;border-radius:50%;margin-bottom:12px}

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  box-shadow:0 2px 8px var(--shadow);
  transition:background .3s,border-color .3s,box-shadow .2s;
}
.card:hover{box-shadow:0 4px 16px var(--shadow)}

/* ── Section titles ──────────────────────────────────────────────────────── */
.section-title{
  font-size:.76rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-secondary);
  margin:36px 0 12px;
}

/* ── Stat cards ──────────────────────────────────────────────────────────── */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));
  gap:10px;
}
.stat-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 16px;
  box-shadow:0 2px 8px var(--shadow);
  transition:box-shadow .2s,background .3s;
}
.stat-card:hover{box-shadow:0 4px 16px var(--shadow)}
.stat-icon{
  font-size:.7rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text-secondary);
  margin-bottom:8px;
}
.stat-value{
  font-size:2rem;font-weight:700;
  color:var(--text-primary);line-height:1.1;
  font-variant-numeric:tabular-nums;letter-spacing:-.025em;
}
.stat-label{font-size:.7rem;color:var(--text-secondary);margin-top:3px}

/* ── Progress bar ────────────────────────────────────────────────────────── */
.progress-wrap{margin-top:10px}
.progress-label{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-secondary);margin-bottom:4px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#c7c7cc 0%,#8e8e93 75%,var(--accent) 100%);
  width:0;transition:width 1s cubic-bezier(.4,0,.2,1);
}

/* ── Chart bars ──────────────────────────────────────────────────────────── */
.chart-wrap{overflow-x:auto;padding-bottom:4px}
.chart{display:flex;align-items:flex-end;gap:8px;height:120px;min-width:260px;padding-top:16px}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:32px}
.bars{display:flex;gap:3px;align-items:flex-end;height:88px}
.bar{
  width:14px;border-radius:3px 3px 0 0;min-height:2px;
  transition:height 1s cubic-bezier(.4,0,.2,1);position:relative;
}
.bar-chunks{background:var(--border)}
.bar-detections{background:var(--text-secondary);opacity:.65}
.bar-val{
  position:absolute;top:-15px;left:50%;transform:translateX(-50%);
  font-size:.58rem;color:var(--text-secondary);white-space:nowrap;
  opacity:0;transition:opacity .15s;
}
.bar:hover .bar-val{opacity:1}
.bar-label{font-size:.62rem;color:var(--text-secondary);text-align:center;max-width:36px;overflow:hidden;text-overflow:ellipsis}
.chart-legend{display:flex;gap:14px;margin-top:12px;font-size:.72rem;color:var(--text-secondary)}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}

/* ── Timeline détections ─────────────────────────────────────────────────── */
.timeline{position:relative;padding-left:28px}
.timeline::before{
  content:'';position:absolute;left:10px;top:8px;bottom:0;
  width:1px;background:var(--border);
}
.det-entry{
  position:relative;margin-bottom:12px;
  opacity:0;animation:fade-in .2s forwards;
}
.det-entry:nth-child(1){animation-delay:.04s}
.det-entry:nth-child(2){animation-delay:.08s}
.det-entry:nth-child(3){animation-delay:.12s}
.det-entry:nth-child(4){animation-delay:.16s}
.det-entry:nth-child(5){animation-delay:.20s}
@keyframes fade-in{to{opacity:1}}

.det-dot{
  position:absolute;left:-22px;top:17px;
  width:10px;height:10px;border-radius:50%;
  background:var(--border);border:2px solid var(--bg-primary);
  z-index:1;
}
.det-dot.confirmed{background:var(--accent)}

.det-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:13px 15px;
  box-shadow:0 1px 4px var(--shadow);
  transition:background .3s;
}
.det-header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.det-time{font-family:var(--mono);font-size:.75rem;color:var(--text-secondary)}
.det-session-label{font-size:.7rem;color:var(--text-secondary)}
.det-text{font-size:.88rem;margin-bottom:10px;color:var(--text-primary)}
.det-text mark{background:rgba(255,200,0,.3);color:inherit;border-radius:2px;padding:0 2px}
.confidence-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.conf-bar-outer{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.conf-bar-inner{height:100%;border-radius:2px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1)}
.badge-conf{
  font-size:.68rem;font-weight:600;padding:2px 7px;
  border-radius:10px;border:1px solid;white-space:nowrap;
}
.badge-high{color:var(--success);background:rgba(52,199,89,.08);border-color:rgba(52,199,89,.25)}
.badge-mid{color:var(--warning);background:rgba(255,159,10,.08);border-color:rgba(255,159,10,.25)}
.badge-low{color:var(--text-secondary);background:var(--bg-primary);border-color:var(--border)}
.btn-ctx{
  font-size:.71rem;color:var(--text-secondary);background:none;border:none;
  padding:0;margin-top:8px;display:flex;align-items:center;gap:4px;
}
.btn-ctx:hover{color:var(--text-primary)}
.det-ctx{
  display:none;margin-top:8px;
  background:var(--bg-primary);border-radius:var(--radius-sm);
  padding:10px 12px;font-size:.77rem;color:var(--text-secondary);
  font-family:var(--mono);white-space:pre-wrap;word-break:break-word;
  border:1px solid var(--border);
}
.det-ctx.open{display:block}

/* ── Sessions ────────────────────────────────────────────────────────────── */
.session-item{
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:8px;overflow:hidden;
  box-shadow:0 1px 4px var(--shadow);
  transition:border-color .15s;
}
.session-item:hover{border-color:#c7c7cc}
[data-theme="dark"] .session-item:hover{border-color:#636366}
.session-head{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;padding:13px 16px;
  background:var(--bg-card);cursor:pointer;
  user-select:none;transition:background .15s;
}
.session-head:hover{background:var(--bg-primary)}
.session-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.session-date{font-weight:600;font-size:.9rem}
.session-info{font-size:.77rem;color:var(--text-secondary)}
.badge{font-size:.67rem;font-weight:600;padding:2px 8px;border-radius:10px;border:1px solid}
.badge-detected{color:var(--success);background:rgba(52,199,89,.08);border-color:rgba(52,199,89,.25)}
.badge-nothing{color:var(--text-secondary);background:var(--bg-primary);border-color:var(--border)}
.chevron{color:var(--text-secondary);font-size:.72rem;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.session-body{display:none;padding:14px 16px;border-top:1px solid var(--border)}
.session-body.open{display:block}
.session-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.btn-sm{
  background:var(--bg-primary);border:1px solid var(--border);
  color:var(--text-secondary);border-radius:6px;
  padding:5px 11px;font-size:.75rem;font-weight:500;
  transition:border-color .15s,color .15s,background .15s;
}
.btn-sm:hover,.btn-sm.active{border-color:var(--accent);color:var(--accent);background:rgba(232,0,61,.04)}

/* ── Transcription ───────────────────────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:8px}
.search-box{
  width:100%;padding:7px 30px 7px 10px;
  background:var(--bg-primary);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);font-size:.81rem;
  transition:border-color .15s;
}
.search-box:focus{outline:none;border-color:var(--accent)}
.search-clear{
  position:absolute;right:9px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-secondary);font-size:.75rem;display:none;
}
.transcript-list{max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.transcript-list::-webkit-scrollbar{width:3px}
.transcript-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tr-entry{
  display:flex;gap:10px;padding:5px 0;
  border-bottom:1px solid var(--border);font-size:.79rem;
  font-family:var(--mono);
}
.tr-entry:last-child{border-bottom:none}
.tr-ts{color:var(--text-secondary);flex-shrink:0;width:62px}
.tr-text{flex:1;word-break:break-word;padding-right:28px;position:relative}
.btn-copy{
  position:absolute;right:0;top:0;
  background:none;border:1px solid var(--border);
  color:var(--text-secondary);border-radius:3px;
  padding:1px 5px;font-size:.64rem;opacity:0;
  transition:opacity .15s;
}
.tr-entry:hover .btn-copy{opacity:1}
.btn-copy:hover{color:var(--text-primary)}
.btn-copy.copied{color:var(--success);border-color:var(--success)}
mark{background:rgba(255,200,0,.35);color:inherit;border-radius:2px;padding:0 1px}
[data-theme="dark"] mark{background:rgba(255,200,0,.2)}
.tr-entry.hidden{display:none}

/* ── Empty / Error ───────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px}
.empty-state svg{width:52px;height:52px;margin-bottom:12px;opacity:.22}
.empty-state p{color:var(--text-secondary);font-size:.84rem}

.error-box{
  background:var(--bg-secondary);border:1px solid var(--border);
  border-radius:var(--radius);padding:13px 18px;margin-bottom:16px;
  display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.error-box p{color:var(--text-secondary);font-size:.83rem}
.btn-retry{
  background:none;color:var(--text-secondary);border:1px solid var(--border);
  border-radius:6px;padding:5px 12px;font-size:.77rem;font-weight:500;
  transition:border-color .15s,color .15s;
}
.btn-retry:hover{border-color:var(--text-primary);color:var(--text-primary)}

#loader{display:none;padding:48px 0}
.spinner{
  width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--text-secondary);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{text-align:center;color:var(--text-secondary);font-size:.84rem}

/* ── Footer ──────────────────────────────────────────────────────────────── */
footer{
  margin-top:48px;padding:20px 0;
  border-top:1px solid var(--border);
  text-align:center;font-size:.72rem;color:var(--text-secondary);
}
footer a{color:var(--text-secondary)}
footer a:hover{color:var(--text-primary)}

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:520px){
  .brand-text h1{font-size:.9rem}
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-value{font-size:1.7rem}
  .timeline{padding-left:24px}
  .det-dot{left:-19px;width:9px;height:9px;top:18px}
  .timeline::before{left:8px}
  .nav-link{padding:9px 10px;font-size:.77rem}
  nav{top:51px}
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- dot of the "i" — accent color -->
        <circle cx="15" cy="8" r="3.5" fill="#E8003D" class="logo-dot"/>
        <!-- stem of the "i" -->
        <rect x="12.5" y="14" width="5" height="12" rx="2.5" fill="#3a3a3c" class="logo-stem"/>
      </svg>
      <div class="brand-text">
        <h1>Radio Nova Watcher</h1>
        <p>Surveillance automatique de La Dernière</p>
      </div>
    </div>
    <div class="header-right">
      <div class="session-badge" id="session-badge">
        <span id="badge-text">Calcul…</span>
      </div>
      <button class="btn-theme" id="btn-theme" title="Changer le thème" onclick="toggleTheme()">🌙</button>
      <button class="btn-refresh" onclick="loadData()">↻ Actualiser</button>
    </div>
  </div>
</header>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav>
  <div class="nav-inner">
    <button class="nav-link active" onclick="scrollTo('sec-status')">Statut</button>
    <button class="nav-link" onclick="scrollTo('sec-chart')">Statistiques</button>
    <button class="nav-link" onclick="scrollTo('sec-detections')">Détections</button>
    <button class="nav-link" onclick="scrollTo('sec-sessions')">Sessions</button>
  </div>
</nav>

<!-- ── Content ─────────────────────────────────────────────────────────────── -->
<div class="container">
  <div id="loader">
    <div class="spinner"></div>
    <p>Chargement des données…</p>
  </div>
  <div class="error-box" id="error-box">
    <p id="error-msg"></p>
    <button class="btn-retry" onclick="loadData()">Réessayer</button>
  </div>
  <div id="content"></div>
</div>

<footer>
  <p>Radio Nova Watcher — <a href="https://github.com/thlsrpro/radio-nova-watcher" target="_blank">GitHub</a> &nbsp;·&nbsp; <span id="last-updated"></span></p>
</footer>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const GIST_RAW_URL = "GIST_RAW_URL_PLACEHOLDER";
const LS_KEY   = "rnw_cache";
const LS_THEME = "theme";

// ── Thème ─────────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("btn-theme").textContent = t === "dark" ? "☀️" : "🌙";
  // Adapt logo colors to theme
  const dot  = document.querySelector(".logo-dot");
  const stem = document.querySelector(".logo-stem");
  if (dot)  dot.setAttribute("fill",  t === "dark" ? "#ff375f" : "#E8003D");
  if (stem) stem.setAttribute("fill", t === "dark" ? "#98989d" : "#3a3a3c");
  localStorage.setItem(LS_THEME, t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
}
applyTheme(localStorage.getItem(LS_THEME) ?? "light");

// ── Navigation ────────────────────────────────────────────────────────────
function scrollTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}
function updateNav() {
  const sections = ["sec-status","sec-chart","sec-detections","sec-sessions"];
  const links = document.querySelectorAll(".nav-link");
  let current = 0;
  sections.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el && el.getBoundingClientRect().top < 160) current = i;
  });
  links.forEach((l, i) => l.classList.toggle("active", i === current));
}
window.addEventListener("scroll", updateNav, { passive: true });

// ── Utilitaires ───────────────────────────────────────────────────────────
function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtDate(iso) {
  if (!iso) return "—";
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function fmtDur(min) {
  const h = Math.floor(min/60), m = Math.round(min%60);
  return h > 0 ? `${h}h${String(m).padStart(2,"0")}` : `${m}min`;
}
function confColor(c) {
  if (c >= 90) return "var(--success)";
  if (c >= 70) return "var(--warning)";
  return "var(--text-secondary)";
}
function confBadge(c) {
  if (c >= 90) return `<span class="badge-conf badge-high">${c}%</span>`;
  if (c >= 70) return `<span class="badge-conf badge-mid">${c}%</span>`;
  return `<span class="badge-conf badge-low">${c}%</span>`;
}
function nextSundayLabel() {
  const now = new Date(), d = new Date(now);
  d.setDate(d.getDate() + ((7 - d.getDay()) % 7 || 7));
  return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
}
function isLiveNow() {
  const now = new Date();
  return now.getDay() === 0 && now.getHours() >= 18 && now.getHours() < 20;
}
function hlSearch(text, q) {
  if (!q) return esc(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
  return esc(text).replace(re, "<mark>$1</mark>");
}

// ── Count-up ──────────────────────────────────────────────────────────────
function countUp(el, target, duration = 800) {
  const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / duration, 1);
    el.textContent = Math.round((1 - Math.pow(1 - p, 3)) * target);
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ── Skeleton ──────────────────────────────────────────────────────────────
function skeletonHTML() {
  return `
    <div class="stats-row" style="margin-top:28px">
      ${Array(4).fill(`<div class="skeleton-card"><div class="sk-circle skeleton"></div><div class="sk-line skeleton"></div><div class="sk-line-short skeleton"></div></div>`).join("")}
    </div>
    ${Array(3).fill(`<div class="skeleton-card" style="margin-top:10px"><div class="sk-line skeleton"></div><div class="sk-line skeleton"></div><div class="sk-line-short skeleton"></div></div>`).join("")}`;
}

// ── Header badge ──────────────────────────────────────────────────────────
function updateBadge() {
  const badge = document.getElementById("session-badge");
  const text  = document.getElementById("badge-text");
  if (isLiveNow()) {
    badge.classList.add("live");
    badge.innerHTML = `<span class="live-pulse"></span><span>EN DIRECT</span>`;
  } else {
    badge.classList.remove("live");
    text.textContent = `Dim. ${nextSundayLabel()} · 18h`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function render(data) {
  const sessions = (data.sessions || []).slice().reverse();
  updateBadge();
  const totalDet = sessions.reduce((s,x) => s + (x.detections||[]).length, 0);
  const totalH   = sessions.reduce((s,x) => s + (x.duration_minutes||0), 0) / 60;
  const totalCh  = sessions.reduce((s,x) => s + (x.chunks_processed||0), 0);
  const last     = sessions[0];

  if (data.last_updated || last) {
    document.getElementById("last-updated").textContent =
      "Mise à jour : " + (data.last_updated || last?.date || "");
  }

  let html = `<div id="sec-status" style="height:1px;margin-top:-1px"></div>`;

  // ── Stat cards ──
  html += `<div class="stats-row" style="margin-top:28px">
    <div class="stat-card">
      <div class="stat-icon">Sessions</div>
      <div class="stat-value" id="cnt-sessions">0</div>
      <div class="stat-label">enregistrées</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">Détections</div>
      <div class="stat-value" id="cnt-detections">0</div>
      <div class="stat-label">annonces détectées</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">Durée</div>
      <div class="stat-value" id="cnt-hours">0</div>
      <div class="stat-label">heures surveillées</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">Chunks</div>
      <div class="stat-value" id="cnt-chunks">0</div>
      <div class="stat-label">segments analysés</div>
    </div>
  </div>`;

  // ── Chart ──
  html += `<div id="sec-chart" style="height:1px;margin-top:-1px"></div>`;
  html += `<div class="section-title">Statistiques par session</div>`;
  html += renderChart(sessions);

  // ── Détections ──
  const allDets = sessions.flatMap(s =>
    (s.detections||[]).map(d => ({...d, session_date: s.date}))
  );
  html += `<div id="sec-detections" style="height:1px;margin-top:-1px"></div>`;
  html += `<div class="section-title">Détections <span style="font-weight:400">(${allDets.length})</span></div>`;
  if (allDets.length === 0) {
    html += emptyState("Aucune détection enregistrée", "Continuez la surveillance — une annonce peut arriver à tout moment.");
  } else {
    html += `<div class="timeline">`;
    allDets.forEach((d,i) => { html += renderDetection(d,i); });
    html += `</div>`;
  }

  // ── Sessions ──
  html += `<div id="sec-sessions" style="height:1px;margin-top:-1px"></div>`;
  html += `<div class="section-title">Historique <span style="font-weight:400">(${sessions.length} sessions)</span></div>`;
  if (sessions.length === 0) {
    html += emptyState("Aucune session enregistrée", "Lancez une première surveillance pour voir l'historique ici.");
  } else {
    sessions.forEach((s,i) => { html += renderSession(s,i); });
  }

  document.getElementById("content").innerHTML = html;

  // Count-up
  countUp(document.getElementById("cnt-sessions"), sessions.length);
  countUp(document.getElementById("cnt-detections"), totalDet);
  countUp(document.getElementById("cnt-hours"), parseFloat(totalH.toFixed(1)) * 10, 800);
  setTimeout(() => {
    const el = document.getElementById("cnt-hours");
    if (el) el.textContent = totalH.toFixed(1);
  }, 850);
  countUp(document.getElementById("cnt-chunks"), totalCh);

  requestAnimationFrame(() => {
    document.querySelectorAll(".conf-bar-inner[data-width]").forEach(el => {
      el.style.width = el.dataset.width + "%";
    });
    document.querySelectorAll(".progress-fill[data-width]").forEach(el => {
      el.style.width = el.dataset.width + "%";
    });
    document.querySelectorAll(".bar[data-h]").forEach(el => {
      el.style.height = el.dataset.h + "px";
    });
  });

  attachHandlers();
}

// ── Chart ─────────────────────────────────────────────────────────────────
function renderChart(sessions) {
  const vis = sessions.slice(0,12).reverse();
  if (!vis.length) return `<div class="card">${emptyState("Pas encore de données","")}</div>`;
  const maxCh  = Math.max(...vis.map(s => s.chunks_processed||0), 1);
  const maxDet = Math.max(...vis.map(s => (s.detections||[]).length), 1);

  const bars = vis.map(s => {
    const ch  = s.chunks_processed||0;
    const det = (s.detections||[]).length;
    const hCh  = Math.max(3, Math.round((ch/maxCh)*82));
    const hDet = Math.max(det?3:0, Math.round((det/maxDet)*82));
    const lbl  = (s.date||"").slice(5);
    return `<div class="bar-group">
      <div class="bars">
        <div class="bar bar-chunks" style="height:2px" data-h="${hCh}" title="${ch} chunks">
          <span class="bar-val">${ch}</span>
        </div>
        <div class="bar bar-detections" style="height:2px" data-h="${hDet}" title="${det} détections">
          <span class="bar-val">${det}</span>
        </div>
      </div>
      <div class="bar-label">${esc(lbl)}</div>
    </div>`;
  }).join("");

  return `<div class="card">
    <div class="chart-wrap"><div class="chart">${bars}</div></div>
    <div class="chart-legend">
      <span><span class="legend-dot" style="background:var(--border)"></span>Chunks traités</span>
      <span><span class="legend-dot" style="background:var(--text-secondary);opacity:.65"></span>Détections</span>
    </div>
  </div>`;
}

// ── Détection ─────────────────────────────────────────────────────────────
function renderDetection(d, i) {
  const c = d.confidence||0;
  const hasCtx = (d.transcription_context||"").trim();
  return `<div class="det-entry" id="det-${i}">
    <div class="det-dot${d.notification_sent ? " confirmed" : ""}"></div>
    <div class="det-card">
      <div class="det-header">
        <span class="det-time">${esc(d.timestamp||"—")}</span>
        <span class="det-session-label">Session du ${fmtDate(d.session_date)}</span>
        ${d.notification_sent ? '<span class="badge badge-detected">Notifié</span>' : ""}
      </div>
      <div class="det-text">${esc(d.extracted_info||"(sans info)")}</div>
      <div class="confidence-row">
        <div class="conf-bar-outer">
          <div class="conf-bar-inner" style="width:0;background:${confColor(c)}" data-width="${c}"></div>
        </div>
        ${confBadge(c)}
      </div>
      ${hasCtx ? `<button class="btn-ctx" onclick="toggleCtx(${i})">▶ Contexte complet</button>
        <div class="det-ctx" id="ctx-${i}">${esc(d.transcription_context)}</div>` : ""}
    </div>
  </div>`;
}

// ── Session ───────────────────────────────────────────────────────────────
function renderSession(s, i) {
  const dets   = s.detections||[];
  const tr     = s.full_transcript||[];
  const hasDet = dets.length > 0;
  const badge  = hasDet
    ? `<span class="badge badge-detected">${dets.length} détection${dets.length>1?"s":""}</span>`
    : `<span class="badge badge-nothing">Rien détecté</span>`;

  const detCards = dets.map(d => `<div class="det-card" style="margin-bottom:8px">
    <div class="det-header"><span class="det-time">${esc(d.timestamp||"—")}</span></div>
    <div class="det-text">${esc(d.extracted_info||"")}</div>
    <div class="confidence-row" style="margin-top:8px">
      <div class="conf-bar-outer">
        <div class="conf-bar-inner" style="width:0;background:${confColor(d.confidence||0)}" data-width="${d.confidence||0}"></div>
      </div>
      ${confBadge(d.confidence||0)}
    </div>
  </div>`).join("");

  const trRows = tr.map(t => `<div class="tr-entry" data-q="${esc((t.text||"").toLowerCase())}">
    <span class="tr-ts">${esc(t.timestamp||"")}</span>
    <div class="tr-text">
      <span class="tr-raw">${esc(t.text||"")}</span>
      <button class="btn-copy" onclick="copyText(this,'${esc(t.text||"").replace(/'/g,"\\'")}')">Copier</button>
    </div>
  </div>`).join("");

  return `<div class="session-item" id="sess-${i}">
    <div class="session-head" onclick="toggleSession(${i})">
      <div class="session-meta">
        <span class="session-date">${fmtDate(s.date)}</span>
        <span class="session-info">${fmtDur(s.duration_minutes||0)} · ${s.chunks_processed||0} chunks · ${s.groq_requests||0} req Groq</span>
        ${badge}
      </div>
      <span class="chevron" id="chev-${i}">▼</span>
    </div>
    <div class="session-body" id="body-${i}">
      <div class="session-actions">
        ${hasDet ? `<button class="btn-sm" id="btn-det-${i}" onclick="togglePanel('det-panel-${i}','btn-det-${i}')">Détections (${dets.length})</button>` : ""}
        ${tr.length ? `<button class="btn-sm" id="btn-tr-${i}" onclick="togglePanel('tr-panel-${i}','btn-tr-${i}')">Transcription (${tr.length})</button>` : ""}
      </div>
      ${hasDet ? `<div id="det-panel-${i}" style="display:none">${detCards}</div>` : ""}
      ${tr.length ? `<div id="tr-panel-${i}" style="display:none">
        <div class="search-wrap">
          <input class="search-box" type="text" placeholder="Rechercher dans la transcription…"
                 oninput="filterTr(${i},this.value)" id="srch-${i}">
          <button class="search-clear" id="clr-${i}" onclick="clearSearch(${i})">✕</button>
        </div>
        <div class="transcript-list">${trRows||'<p style="color:var(--text-secondary);font-size:.81rem;padding:8px 0">Aucune transcription.</p>'}</div>
      </div>` : ""}
    </div>
  </div>`;
}

// ── Empty state ───────────────────────────────────────────────────────────
function emptyState(title, sub) {
  return `<div class="empty-state">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="26" stroke="currentColor" stroke-width="1.5"/>
      <path d="M24 32h16M30 24l8 8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p><strong>${esc(title)}</strong></p>
    ${sub ? `<p style="margin-top:6px;font-size:.79rem">${esc(sub)}</p>` : ""}
  </div>`;
}

// ── Interactions ──────────────────────────────────────────────────────────
function attachHandlers() {}

function toggleSession(i) {
  const body = document.getElementById(`body-${i}`);
  const chev = document.getElementById(`chev-${i}`);
  const open = body.classList.toggle("open");
  chev.classList.toggle("open", open);
  if (open) {
    requestAnimationFrame(() => {
      body.querySelectorAll(".conf-bar-inner[data-width]").forEach(el => {
        el.style.width = el.dataset.width + "%";
      });
    });
  }
}

function togglePanel(id, btnId) {
  const el  = document.getElementById(id);
  const btn = document.getElementById(btnId);
  const vis = el.style.display !== "none";
  el.style.display = vis ? "none" : "block";
  btn.classList.toggle("active", !vis);
  if (!vis) {
    requestAnimationFrame(() => {
      el.querySelectorAll(".conf-bar-inner[data-width]").forEach(e => {
        e.style.width = e.dataset.width + "%";
      });
    });
  }
}

function toggleCtx(i) {
  const ctx = document.getElementById(`ctx-${i}`);
  const btn = ctx.previousElementSibling;
  const open = ctx.classList.toggle("open");
  btn.textContent = open ? "▼ Masquer le contexte" : "▶ Contexte complet";
}

function filterTr(i, q) {
  const norm = q.toLowerCase().trim();
  const clr  = document.getElementById(`clr-${i}`);
  if (clr) clr.style.display = norm ? "block" : "none";
  const panel = document.getElementById(`tr-panel-${i}`);
  if (!panel) return;
  panel.querySelectorAll(".tr-entry").forEach(row => {
    const txt   = row.dataset.q || "";
    const match = !norm || txt.includes(norm);
    row.classList.toggle("hidden", !match);
    const span  = row.querySelector(".tr-raw");
    if (span) span.innerHTML = norm && match ? hlSearch(span.textContent, norm) : esc(span.textContent);
  });
}

function clearSearch(i) {
  const inp = document.getElementById(`srch-${i}`);
  if (inp) { inp.value = ""; filterTr(i, ""); }
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copier"; btn.classList.remove("copied"); }, 1500);
  }).catch(() => {});
}

// ── Chargement ────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById("loader").style.display = "block";
  document.getElementById("content").innerHTML = skeletonHTML();
  document.getElementById("content").style.opacity = ".35";
  document.getElementById("error-box").style.display = "none";

  if (GIST_RAW_URL && GIST_RAW_URL !== "GIST_RAW_URL_PLACEHOLDER") {
    try {
      const resp = await fetch(GIST_RAW_URL + "?t=" + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      localStorage.setItem(LS_KEY, JSON.stringify(data));
      finish(data, false);
      return;
    } catch(e) { console.warn("Gist fetch failed:", e); }
  }

  const cached = localStorage.getItem(LS_KEY);
  if (cached) {
    try { finish(JSON.parse(cached), true); return; } catch(_) {}
  }

  document.getElementById("loader").style.display = "none";
  document.getElementById("content").innerHTML = "";
  document.getElementById("content").style.opacity = "1";
  const box = document.getElementById("error-box");
  box.style.display = "flex";
  document.getElementById("error-msg").textContent = GIST_RAW_URL === "GIST_RAW_URL_PLACEHOLDER"
    ? "⚙️ Dashboard non encore configuré — lancez une première session avec GIST_ENABLED=true."
    : "Impossible de charger les données. Vérifiez que le Gist est accessible.";
  render({ sessions: [] });
}

function finish(data, fromCache) {
  document.getElementById("loader").style.display = "none";
  document.getElementById("content").style.opacity = "1";
  if (fromCache) {
    const box = document.getElementById("error-box");
    box.style.display = "flex";
    document.getElementById("error-msg").textContent = "⚠️ Données depuis le cache local — Gist inaccessible.";
  }
  render(data);
}

// ── Init ──────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
