<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Nova Watcher</title>
<style>
/* ── Variables ───────────────────────────────────────────────────────────── */
:root {
  --bg-primary:   #f8f9fa;
  --bg-secondary: #ffffff;
  --bg-card:      #ffffff;
  --text-primary: #1c1c1e;
  --text-secondary: #6e6e73;
  --accent:   #E8003D;
  --border:   #e8e8ed;
  --success:  #34c759;
  --warning:  #ff9f0a;
  --shadow:   rgba(0,0,0,.08);
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  --mono: "SF Mono", "Monaco", "Courier New", monospace;
  --radius: 12px;
  --radius-sm: 8px;
}
[data-theme="dark"] {
  --bg-primary:   #1c1c1e;
  --bg-secondary: #2c2c2e;
  --bg-card:      #2c2c2e;
  --text-primary: #f5f5f7;
  --text-secondary: #98989d;
  --accent:  #ff375f;
  --border:  #3a3a3c;
  --success: #32d74b;
  --warning: #ffd60a;
  --shadow:  rgba(0,0,0,.3);
}

/* ── Reset ───────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg-primary);color:var(--text-primary);
  font-family:var(--font);font-size:15px;line-height:1.6;
  transition:background .3s,color .3s;min-height:100vh;
}
a{color:var(--text-secondary);text-decoration:none}
a:hover{color:var(--text-primary)}
button{cursor:pointer;font-family:inherit}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.container{max-width:920px;margin:0 auto;padding:0 20px 80px}

/* ── Header ──────────────────────────────────────────────────────────────── */
header{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  padding:12px 0;
  position:sticky;top:0;z-index:100;
  transition:background .3s;
}
.header-inner{
  max-width:920px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-logo{flex-shrink:0;width:30px;height:30px}
.brand-text h1{
  font-size:.98rem;font-weight:600;color:var(--text-primary);
  white-space:nowrap;letter-spacing:-.01em;
}
.brand-text p{font-size:.7rem;color:var(--text-secondary);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

.session-badge{
  display:flex;align-items:center;gap:5px;
  font-size:.73rem;font-weight:500;
  padding:4px 10px;border-radius:20px;
  background:var(--bg-primary);border:1px solid var(--border);
  color:var(--text-secondary);
}
.session-badge.live{
  background:rgba(232,0,61,.07);border-color:rgba(232,0,61,.2);
  color:var(--accent);
}
.live-pulse{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  animation:pulse-dot 1.4s infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

.btn-theme{
  background:none;border:none;color:var(--text-secondary);
  width:30px;height:30px;font-size:.88rem;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:background .15s,color .15s;
}
.btn-theme:hover{background:var(--bg-primary);color:var(--text-primary)}

.btn-refresh{
  background:none;color:var(--accent);border:1px solid var(--accent);
  border-radius:6px;padding:4px 11px;
  font-size:.76rem;font-weight:500;
  transition:background .15s;
}
.btn-refresh:hover{background:rgba(232,0,61,.05)}

/* ── Navbar ──────────────────────────────────────────────────────────────── */
nav{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  position:sticky;top:55px;z-index:90;
  overflow-x:auto;white-space:nowrap;
  transition:background .3s;
}
nav::-webkit-scrollbar{height:0}
.nav-inner{
  max-width:920px;margin:0 auto;padding:0 20px;
  display:flex;gap:0;
}
.nav-link{
  padding:9px 14px;font-size:.81rem;font-weight:500;
  color:var(--text-secondary);border:none;background:none;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.nav-link:hover{color:var(--text-primary)}
.nav-link.active{color:var(--text-primary);border-bottom-color:var(--accent)}

/* ── Skeleton ────────────────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--border) 25%,var(--bg-secondary) 50%,var(--border) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:var(--radius-sm);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:10px;
}
.sk-line{height:12px;margin-bottom:10px}
.sk-line-short{height:12px;width:55%;margin-bottom:10px}
.sk-circle{width:38px;height:38px;border-radius:50%;margin-bottom:12px}

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  box-shadow:0 2px 8px var(--shadow);
  transition:background .3s,border-color .3s,box-shadow .2s;
}
.card:hover{box-shadow:0 4px 16px var(--shadow)}

/* ── Section titles ──────────────────────────────────────────────────────── */
.section-title{
  font-size:.76rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-secondary);
  margin:36px 0 12px;
}

/* ── Stat cards ──────────────────────────────────────────────────────────── */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));
  gap:10px;
}
.stat-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 16px;
  box-shadow:0 2px 8px var(--shadow);
  transition:box-shadow .2s,background .3s;
}
.stat-card:hover{box-shadow:0 4px 16px var(--shadow)}
.stat-icon{
  font-size:.7rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text-secondary);
  margin-bottom:8px;
}
.stat-value{
  font-size:2rem;font-weight:700;
  color:var(--text-primary);line-height:1.1;
  font-variant-numeric:tabular-nums;letter-spacing:-.025em;
}
.stat-label{font-size:.7rem;color:var(--text-secondary);margin-top:3px}

/* ── Progress bar ────────────────────────────────────────────────────────── */
.progress-wrap{margin-top:10px}
.progress-label{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-secondary);margin-bottom:4px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#c7c7cc 0%,#8e8e93 75%,var(--accent) 100%);
  width:0;transition:width 1s cubic-bezier(.4,0,.2,1);
}

/* ── Chart bars ──────────────────────────────────────────────────────────── */
.chart-wrap{overflow-x:auto;padding-bottom:4px}
.chart{display:flex;align-items:flex-end;gap:8px;height:120px;min-width:260px;padding-top:16px}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:32px}
.bars{display:flex;gap:3px;align-items:flex-end;height:88px}
.bar{
  width:14px;border-radius:3px 3px 0 0;min-height:2px;
  transition:height 1s cubic-bezier(.4,0,.2,1);position:relative;
}
.bar-chunks{background:var(--border)}
.bar-detections{background:var(--text-secondary);opacity:.65}
.bar-val{
  position:absolute;top:-15px;left:50%;transform:translateX(-50%);
  font-size:.58rem;color:var(--text-secondary);white-space:nowrap;
  opacity:0;transition:opacity .15s;
}
.bar:hover .bar-val{opacity:1}
.bar-label{font-size:.62rem;color:var(--text-secondary);text-align:center;max-width:36px;overflow:hidden;text-overflow:ellipsis}
.chart-legend{display:flex;gap:14px;margin-top:12px;font-size:.72rem;color:var(--text-secondary)}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}

/* ── Timeline détections ─────────────────────────────────────────────────── */
.timeline{position:relative;padding-left:28px}
.timeline::before{
  content:'';position:absolute;left:10px;top:8px;bottom:0;
  width:1px;background:var(--border);
}
.det-entry{
  position:relative;margin-bottom:12px;
  opacity:0;animation:fade-in .2s forwards;
}
.det-entry:nth-child(1){animation-delay:.04s}
.det-entry:nth-child(2){animation-delay:.08s}
.det-entry:nth-child(3){animation-delay:.12s}
.det-entry:nth-child(4){animation-delay:.16s}
.det-entry:nth-child(5){animation-delay:.20s}
@keyframes fade-in{to{opacity:1}}

.det-dot{
  position:absolute;left:-22px;top:17px;
  width:10px;height:10px;border-radius:50%;
  background:var(--border);border:2px solid var(--bg-primary);
  z-index:1;
}
.det-dot.confirmed{background:var(--accent)}

.det-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:13px 15px;
  box-shadow:0 1px 4px var(--shadow);
  transition:background .3s;
}
.det-header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.det-time{font-family:var(--mono);font-size:.75rem;color:var(--text-secondary)}
.det-session-label{font-size:.7rem;color:var(--text-secondary)}
.det-text{font-size:.88rem;margin-bottom:10px;color:var(--text-primary)}
.det-text mark{background:rgba(255,200,0,.3);color:inherit;border-radius:2px;padding:0 2px}
.confidence-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.conf-bar-outer{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.conf-bar-inner{height:100%;border-radius:2px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1)}
.badge-conf{
  font-size:.68rem;font-weight:600;padding:2px 7px;
  border-radius:10px;border:1px solid;white-space:nowrap;
}
.badge-high{color:var(--success);background:rgba(52,199,89,.08);border-color:rgba(52,199,89,.25)}
.badge-mid{color:var(--warning);background:rgba(255,159,10,.08);border-color:rgba(255,159,10,.25)}
.badge-low{color:var(--text-secondary);background:var(--bg-primary);border-color:var(--border)}
.btn-ctx{
  font-size:.71rem;color:var(--text-secondary);background:none;border:none;
  padding:0;margin-top:8px;display:flex;align-items:center;gap:4px;
}
.btn-ctx:hover{color:var(--text-primary)}
.det-ctx{
  display:none;margin-top:8px;
  background:var(--bg-primary);border-radius:var(--radius-sm);
  padding:10px 12px;font-size:.77rem;color:var(--text-secondary);
  font-family:var(--mono);white-space:pre-wrap;word-break:break-word;
  border:1px solid var(--border);
}
.det-ctx.open{display:block}

/* ── Session list (cards) ────────────────────────────────────────────────── */
.session-card{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 16px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
  cursor:pointer;user-select:none;
  box-shadow:0 1px 4px var(--shadow);
  transition:border-color .15s,box-shadow .15s;
}
.session-card:hover{border-color:#c7c7cc;box-shadow:0 3px 12px var(--shadow)}
[data-theme="dark"] .session-card:hover{border-color:#636366}
.sc-left{min-width:0;flex:1}
.sc-date{font-weight:600;font-size:.9rem}
.sc-meta{font-size:.75rem;color:var(--text-secondary);margin-top:2px}
.sc-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.sc-arrow{color:var(--text-secondary);font-size:1.1rem;opacity:.5}
.badge{font-size:.67rem;font-weight:600;padding:2px 8px;border-radius:10px;border:1px solid}
.badge-detected{color:var(--success);background:rgba(52,199,89,.08);border-color:rgba(52,199,89,.25)}
.badge-nothing{color:var(--text-secondary);background:var(--bg-primary);border-color:var(--border)}

/* ── Session detail view ─────────────────────────────────────────────────── */
.sess-back-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:none;border:none;
  color:var(--accent);font-size:.82rem;font-weight:500;
  padding:0;margin-bottom:18px;
  transition:opacity .15s;
}
.sess-back-btn:hover{opacity:.7}
.sess-detail-title{font-size:1.1rem;font-weight:600;margin-bottom:6px}
.sess-mini-stats{
  display:flex;flex-wrap:wrap;align-items:center;
  gap:0;font-size:.78rem;color:var(--text-secondary);
}
.sess-mini-stats strong{color:var(--text-primary)}
.sess-mini-sep{margin:0 8px;opacity:.35}

/* ── Sub-tabs ────────────────────────────────────────────────────────────── */
.sub-tabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  margin:18px 0 16px;
}
.sub-tab{
  padding:8px 14px;font-size:.82rem;font-weight:500;
  color:var(--text-secondary);border:none;background:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
}
.sub-tab:hover{color:var(--text-primary)}
.sub-tab.active{color:var(--text-primary);border-bottom-color:var(--accent)}

/* ── Shared utilities ────────────────────────────────────────────────────── */
.btn-sm{
  background:var(--bg-primary);border:1px solid var(--border);
  color:var(--text-secondary);border-radius:6px;
  padding:5px 11px;font-size:.75rem;font-weight:500;
  transition:border-color .15s,color .15s,background .15s;white-space:nowrap;
}
.btn-sm:hover,.btn-sm.active{border-color:var(--accent);color:var(--accent);background:rgba(232,0,61,.04)}
.btn-sm:disabled{opacity:.4;cursor:default}
.btn-icon{
  background:none;border:1px solid var(--border);
  color:var(--text-secondary);border-radius:5px;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;flex-shrink:0;
  transition:border-color .15s,color .15s;
}
.btn-icon:hover:not(:disabled){border-color:var(--text-primary);color:var(--text-primary)}
.btn-icon:disabled{opacity:.3;cursor:default}

/* ── Search box ──────────────────────────────────────────────────────────── */
.search-wrap{position:relative}
.search-box{
  width:100%;padding:7px 30px 7px 10px;
  background:var(--bg-primary);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);font-size:.81rem;
  transition:border-color .15s;
}
.search-box:focus{outline:none;border-color:var(--accent)}
.search-clear{
  position:absolute;right:9px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-secondary);font-size:.75rem;display:none;
}

/* ── Transcript full view ────────────────────────────────────────────────── */
.tr-toolbar{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  margin-bottom:10px;
}
.hit-count{
  font-size:.72rem;color:var(--text-secondary);
  white-space:nowrap;min-width:70px;flex-shrink:0;
}
.transcript-block{
  background:var(--bg-primary);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  max-height:520px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  padding:6px 12px;
}
.transcript-block::-webkit-scrollbar{width:3px}
.transcript-block::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tr-full-entry{
  display:flex;gap:10px;padding:4px 0;
  border-bottom:1px solid transparent;
  font-size:.8rem;font-family:var(--mono);line-height:1.5;
  transition:opacity .1s;
}
.tr-full-entry:last-child{border-bottom:none}
.tr-full-entry.dimmed{opacity:.25}
.tr-full-entry.current-hit{
  background:rgba(255,200,0,.1);
  border-radius:4px;padding:4px 6px;margin:0 -6px;
}
[data-theme="dark"] .tr-full-entry.current-hit{background:rgba(255,200,0,.07)}
.tr-ts{color:var(--text-secondary);flex-shrink:0;width:76px;font-size:.75rem}
.tr-body{flex:1;word-break:break-word;color:var(--text-primary)}
mark{background:rgba(255,200,0,.38);color:inherit;border-radius:2px;padding:0 1px}
[data-theme="dark"] mark{background:rgba(255,200,0,.22)}
.tr-load-more{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:12px 0 4px;
}
.tr-count-label{font-size:.72rem;color:var(--text-secondary)}

/* ── Empty / Error ───────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px}
.empty-state svg{width:52px;height:52px;margin-bottom:12px;opacity:.22}
.empty-state p{color:var(--text-secondary);font-size:.84rem}

.error-box{
  background:var(--bg-secondary);border:1px solid var(--border);
  border-radius:var(--radius);padding:13px 18px;margin-bottom:16px;
  display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.error-box p{color:var(--text-secondary);font-size:.83rem}
.btn-retry{
  background:none;color:var(--text-secondary);border:1px solid var(--border);
  border-radius:6px;padding:5px 12px;font-size:.77rem;font-weight:500;
  transition:border-color .15s,color .15s;
}
.btn-retry:hover{border-color:var(--text-primary);color:var(--text-primary)}

#loader{display:none;padding:48px 0}
.spinner{
  width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--text-secondary);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{text-align:center;color:var(--text-secondary);font-size:.84rem}

/* ── Footer ──────────────────────────────────────────────────────────────── */
footer{
  margin-top:48px;padding:20px 0;
  border-top:1px solid var(--border);
  text-align:center;font-size:.72rem;color:var(--text-secondary);
}
footer a{color:var(--text-secondary)}
footer a:hover{color:var(--text-primary)}

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:520px){
  .brand-text h1{font-size:.9rem}
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-value{font-size:1.7rem}
  .timeline{padding-left:24px}
  .det-dot{left:-19px;width:9px;height:9px;top:18px}
  .timeline::before{left:8px}
  .nav-link{padding:9px 10px;font-size:.77rem}
  nav{top:51px}
  .tr-toolbar{gap:4px}
  .btn-sm{padding:4px 8px;font-size:.71rem}
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="15" cy="8" r="3.5" fill="#E8003D" class="logo-dot"/>
        <rect x="12.5" y="14" width="5" height="12" rx="2.5" fill="#3a3a3c" class="logo-stem"/>
      </svg>
      <div class="brand-text">
        <h1>Radio Nova Watcher</h1>
        <p>Surveillance automatique de La Dernière</p>
      </div>
    </div>
    <div class="header-right">
      <div class="session-badge" id="session-badge">
        <span id="badge-text">Calcul…</span>
      </div>
      <button class="btn-theme" id="btn-theme" title="Changer le thème" onclick="toggleTheme()">🌙</button>
      <button class="btn-refresh" onclick="loadData()">↻ Actualiser</button>
    </div>
  </div>
</header>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav>
  <div class="nav-inner">
    <button class="nav-link active" onclick="scrollTo('sec-status')">Statut</button>
    <button class="nav-link" onclick="scrollTo('sec-chart')">Statistiques</button>
    <button class="nav-link" onclick="scrollTo('sec-detections')">Détections</button>
    <button class="nav-link" onclick="scrollTo('sec-sessions')">Sessions</button>
  </div>
</nav>

<!-- ── Content ─────────────────────────────────────────────────────────────── -->
<div class="container">
  <div id="loader">
    <div class="spinner"></div>
    <p>Chargement des données…</p>
  </div>
  <div class="error-box" id="error-box">
    <p id="error-msg"></p>
    <button class="btn-retry" onclick="loadData()">Réessayer</button>
  </div>
  <div id="content"></div>
</div>

<footer>
  <p>Radio Nova Watcher — <a href="https://github.com/thlsrpro/radio-nova-watcher" target="_blank">GitHub</a> &nbsp;·&nbsp; <span id="last-updated"></span></p>
</footer>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const GIST_RAW_URL = "https://gist.githubusercontent.com/ThLsrPro/6ff7e515265e7b6079bb0eff629c6427/raw/00673440949da8238c9415cabafeb908f7f21f95/sessions.json";
const LS_KEY   = "rnw_cache";
const LS_THEME = "theme";

// ── Session state ─────────────────────────────────────────────────────────
let _allSessions = [];
let _detailIdx   = -1;        // -1 = liste, ≥0 = détail de cette session
let _detailTab   = "transcript"; // "transcript" | "detections"
let _trQuery     = "";
let _trHits      = [];        // indices de chunks correspondants
let _trHitsSet   = new Set();
let _trCursor    = 0;         // index dans _trHits courant
let _trShown     = 50;        // chunks visibles (pagination)
const TR_PAGE    = 50;

// ── Thème ─────────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("btn-theme").textContent = t === "dark" ? "☀️" : "🌙";
  const dot  = document.querySelector(".logo-dot");
  const stem = document.querySelector(".logo-stem");
  if (dot)  dot.setAttribute("fill",  t === "dark" ? "#ff375f" : "#E8003D");
  if (stem) stem.setAttribute("fill", t === "dark" ? "#98989d" : "#3a3a3c");
  localStorage.setItem(LS_THEME, t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
}
applyTheme(localStorage.getItem(LS_THEME) ?? "light");

// ── Navigation ────────────────────────────────────────────────────────────
function scrollTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}
function updateNav() {
  const sections = ["sec-status","sec-chart","sec-detections","sec-sessions"];
  const links = document.querySelectorAll(".nav-link");
  let current = 0;
  sections.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el && el.getBoundingClientRect().top < 160) current = i;
  });
  links.forEach((l, i) => l.classList.toggle("active", i === current));
}
window.addEventListener("scroll", updateNav, { passive: true });

// ── Utilitaires ───────────────────────────────────────────────────────────
function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtDate(iso) {
  if (!iso) return "—";
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function fmtDateFull(iso) {
  if (!iso) return "—";
  const d = new Date(iso + "T12:00:00");
  const s = d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function fmtDur(min) {
  const h = Math.floor(min/60), m = Math.round(min%60);
  return h > 0 ? `${h}h${String(m).padStart(2,"0")}` : `${m}min`;
}
function confColor(c) {
  if (c >= 90) return "var(--success)";
  if (c >= 70) return "var(--warning)";
  return "var(--text-secondary)";
}
function confBadge(c) {
  if (c >= 90) return `<span class="badge-conf badge-high">${c}%</span>`;
  if (c >= 70) return `<span class="badge-conf badge-mid">${c}%</span>`;
  return `<span class="badge-conf badge-low">${c}%</span>`;
}
function nextSundayLabel() {
  const now = new Date(), d = new Date(now);
  d.setDate(d.getDate() + ((7 - d.getDay()) % 7 || 7));
  return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
}
function isLiveNow() {
  const now = new Date();
  return now.getDay() === 0 && now.getHours() >= 18 && now.getHours() < 20;
}
function hlSearch(text, q) {
  if (!q) return esc(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
  return esc(text).replace(re, "<mark>$1</mark>");
}

// ── Count-up ──────────────────────────────────────────────────────────────
function countUp(el, target, duration = 800) {
  const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / duration, 1);
    el.textContent = Math.round((1 - Math.pow(1 - p, 3)) * target);
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ── Skeleton ──────────────────────────────────────────────────────────────
function skeletonHTML() {
  return `
    <div class="stats-row" style="margin-top:28px">
      ${Array(4).fill(`<div class="skeleton-card"><div class="sk-circle skeleton"></div><div class="sk-line skeleton"></div><div class="sk-line-short skeleton"></div></div>`).join("")}
    </div>
    ${Array(3).fill(`<div class="skeleton-card" style="margin-top:10px"><div class="sk-line skeleton"></div><div class="sk-line skeleton"></div><div class="sk-line-short skeleton"></div></div>`).join("")}`;
}

// ── Header badge ──────────────────────────────────────────────────────────
function updateBadge() {
  const badge = document.getElementById("session-badge");
  const text  = document.getElementById("badge-text");
  if (isLiveNow()) {
    badge.classList.add("live");
    badge.innerHTML = `<span class="live-pulse"></span><span>EN DIRECT</span>`;
  } else {
    badge.classList.remove("live");
    text.textContent = `Dim. ${nextSundayLabel()} · 18h`;
  }
}

// ── Render principal ──────────────────────────────────────────────────────
function render(data) {
  _allSessions = (data.sessions || []).slice().reverse();
  _detailIdx   = -1;
  _trQuery     = "";
  _trHits      = [];
  _trHitsSet   = new Set();
  _trCursor    = 0;
  _trShown     = TR_PAGE;

  updateBadge();
  const totalDet = _allSessions.reduce((s,x) => s + (x.detections||[]).length, 0);
  const totalH   = _allSessions.reduce((s,x) => s + (x.duration_minutes||0), 0) / 60;
  const totalCh  = _allSessions.reduce((s,x) => s + (x.chunks_processed||0), 0);
  const last     = _allSessions[0];

  if (data.last_updated || last) {
    document.getElementById("last-updated").textContent =
      "Mise à jour : " + (data.last_updated || last?.date || "");
  }

  let html = `<div id="sec-status" style="height:1px;margin-top:-1px"></div>`;

  // Stat cards
  html += `<div class="stats-row" style="margin-top:28px">
    <div class="stat-card">
      <div class="stat-icon">Sessions</div>
      <div class="stat-value" id="cnt-sessions">0</div>
      <div class="stat-label">enregistrées</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">Détections</div>
      <div class="stat-value" id="cnt-detections">0</div>
      <div class="stat-label">annonces détectées</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">Durée</div>
      <div class="stat-value" id="cnt-hours">0</div>
      <div class="stat-label">heures surveillées</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">Chunks</div>
      <div class="stat-value" id="cnt-chunks">0</div>
      <div class="stat-label">segments analysés</div>
    </div>
  </div>`;

  // Chart
  html += `<div id="sec-chart" style="height:1px;margin-top:-1px"></div>`;
  html += `<div class="section-title">Statistiques par session</div>`;
  html += renderChart(_allSessions);

  // Détections globales
  const allDets = _allSessions.flatMap(s =>
    (s.detections||[]).map(d => ({...d, session_date: s.date}))
  );
  html += `<div id="sec-detections" style="height:1px;margin-top:-1px"></div>`;
  html += `<div class="section-title">Détections <span style="font-weight:400">(${allDets.length})</span></div>`;
  if (allDets.length === 0) {
    html += emptyState("Aucune détection enregistrée", "Continuez la surveillance — une annonce peut arriver à tout moment.");
  } else {
    html += `<div class="timeline">`;
    allDets.forEach((d,i) => { html += renderDetection(d,i); });
    html += `</div>`;
  }

  // Sessions
  html += `<div id="sec-sessions" style="height:1px;margin-top:-1px"></div>`;
  html += `<div id="sessions-container">${buildSessionsContent()}</div>`;

  document.getElementById("content").innerHTML = html;

  // Count-up
  countUp(document.getElementById("cnt-sessions"), _allSessions.length);
  countUp(document.getElementById("cnt-detections"), totalDet);
  countUp(document.getElementById("cnt-hours"), parseFloat(totalH.toFixed(1)) * 10, 800);
  setTimeout(() => {
    const el = document.getElementById("cnt-hours");
    if (el) el.textContent = totalH.toFixed(1);
  }, 850);
  countUp(document.getElementById("cnt-chunks"), totalCh);

  requestAnimationFrame(() => {
    document.querySelectorAll(".conf-bar-inner[data-width]").forEach(el => {
      el.style.width = el.dataset.width + "%";
    });
    document.querySelectorAll(".bar[data-h]").forEach(el => {
      el.style.height = el.dataset.h + "px";
    });
  });
}

// ── Sessions : contenu dynamique ──────────────────────────────────────────
function buildSessionsContent() {
  if (_detailIdx === -1) {
    let h = `<div class="section-title">Historique <span style="font-weight:400">(${_allSessions.length} sessions)</span></div>`;
    if (_allSessions.length === 0) {
      h += emptyState(
        "Aucune session enregistrée pour le moment.",
        "Les sessions apparaîtront ici après la première surveillance du dimanche."
      );
    } else {
      h += _allSessions.map((s,i) => buildSessionCard(s,i)).join("");
    }
    return h;
  }
  return buildSessionDetail(_allSessions[_detailIdx]);
}

function refreshSessionsContainer() {
  const c = document.getElementById("sessions-container");
  if (c) c.innerHTML = buildSessionsContent();
}

// ── Ouverture / fermeture du détail ───────────────────────────────────────
function openSession(i) {
  _detailIdx = i;
  _detailTab = "transcript";
  _trQuery   = "";
  _trHits    = [];
  _trHitsSet = new Set();
  _trCursor  = 0;
  _trShown   = TR_PAGE;
  refreshSessionsContainer();
  setTimeout(() => scrollTo("sec-sessions"), 50);
}

function closeSession() {
  _detailIdx = -1;
  refreshSessionsContainer();
  setTimeout(() => scrollTo("sec-sessions"), 50);
}

function switchDetailTab(tab) {
  _detailTab = tab;
  document.querySelectorAll(".sub-tab").forEach((t,i) => {
    t.classList.toggle("active", (i === 0) === (tab === "transcript"));
  });
  const tr  = document.getElementById("tab-transcript");
  const det = document.getElementById("tab-detections");
  if (tr)  tr.style.display  = tab === "transcript"  ? "" : "none";
  if (det) det.style.display = tab === "detections"  ? "" : "none";
}

// ── Session card (liste) ──────────────────────────────────────────────────
function buildSessionCard(s, i) {
  const dets   = s.detections || [];
  const hasDet = dets.length > 0;
  const badge  = hasDet
    ? `<span class="badge badge-detected">${dets.length} détection${dets.length>1?"s":""}</span>`
    : `<span class="badge badge-nothing">Rien détecté</span>`;
  return `<div class="session-card" onclick="openSession(${i})">
    <div class="sc-left">
      <div class="sc-date">${esc(fmtDateFull(s.date))}</div>
      <div class="sc-meta">${fmtDur(s.duration_minutes||0)} · ${s.chunks_processed||0} chunks · ${s.groq_requests||0} req Groq</div>
    </div>
    <div class="sc-right">
      ${badge}
      <span class="sc-arrow">›</span>
    </div>
  </div>`;
}

// ── Session détail ────────────────────────────────────────────────────────
function buildSessionDetail(s) {
  const dets = s.detections || [];
  const tr   = s.full_transcript || [];
  return `
    <button class="sess-back-btn" onclick="closeSession()">← Sessions</button>
    <div class="sess-detail-title">${esc(fmtDateFull(s.date))}</div>
    <div class="sess-mini-stats">
      <span><strong>${fmtDur(s.duration_minutes||0)}</strong> de surveillance</span>
      <span class="sess-mini-sep">·</span>
      <span><strong>${s.chunks_processed||0}</strong> chunks</span>
      <span class="sess-mini-sep">·</span>
      <span><strong>${dets.length}</strong> détection${dets.length!==1?"s":""}</span>
      <span class="sess-mini-sep">·</span>
      <span><strong>${s.groq_requests||0}</strong> req Groq</span>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab${_detailTab==="transcript"?" active":""}" onclick="switchDetailTab('transcript')">Transcription (${tr.length})</button>
      <button class="sub-tab${_detailTab==="detections"?" active":""}" onclick="switchDetailTab('detections')">Détections (${dets.length})</button>
    </div>
    <div id="tab-transcript" ${_detailTab!=="transcript"?'style="display:none"':""}>
      ${buildTranscriptPanel(tr, s)}
    </div>
    <div id="tab-detections" ${_detailTab!=="detections"?'style="display:none"':""}>
      ${buildDetectionsPanel(dets)}
    </div>`;
}

// ── Panneau transcription ─────────────────────────────────────────────────
function buildTranscriptPanel(tr, s) {
  const hasQuery   = !!_trQuery;
  const hitCount   = _trHits.length;
  const navDisable = !hasQuery || hitCount === 0;
  const prevDis    = navDisable || _trCursor === 0;
  const nextDis    = navDisable || _trCursor >= hitCount - 1;

  let hitLabel = "";
  if (hasQuery) {
    hitLabel = hitCount === 0 ? "Aucun résultat" : `${_trCursor+1} / ${hitCount}`;
  }

  const toolbar = `<div class="tr-toolbar">
    <div class="search-wrap" style="flex:1;min-width:120px">
      <input class="search-box" type="text" id="tr-search"
             placeholder="Rechercher dans la transcription…"
             value="${esc(_trQuery)}"
             oninput="onTrSearch(this.value)">
      <button class="search-clear" id="tr-clr" style="${hasQuery?"display:block":""}" onclick="clearTrSearch()">✕</button>
    </div>
    <span class="hit-count" id="hit-count" style="${hasQuery?"":"visibility:hidden"}">${esc(hitLabel)}</span>
    <button class="btn-icon" id="tr-prev" onclick="navigateTrHit(-1)" title="Résultat précédent" ${prevDis?"disabled":""}>↑</button>
    <button class="btn-icon" id="tr-next" onclick="navigateTrHit(1)"  title="Résultat suivant"   ${nextDis?"disabled":""}>↓</button>
    <button class="btn-sm" id="btn-copy-all" onclick="copyAllTranscript()">Copier tout</button>
    <button class="btn-sm" onclick="downloadTranscript()">Télécharger .txt</button>
  </div>`;

  if (tr.length === 0) {
    return toolbar + emptyState("Aucune transcription disponible", "");
  }

  return toolbar + `<div class="transcript-block" id="tr-full-content">${buildTrEntries(tr)}</div>`;
}

// ── Entrées transcription ─────────────────────────────────────────────────
function buildTrEntries(tr) {
  const hasQuery  = !!_trQuery;
  // Sans recherche : pagination. Avec recherche : tout afficher
  const visible   = hasQuery ? tr : tr.slice(0, _trShown);
  let html = visible.map((t, rawIdx) => {
    // rawIdx est l'index dans `visible`, pas dans `tr` – recalcule
    const chunkIdx = hasQuery ? rawIdx : rawIdx; // pour le set
    // Trouver le vrai index dans tr si on cherche
    const trueIdx  = hasQuery ? tr.indexOf(t) : rawIdx;
    const isHit    = _trHitsSet.has(trueIdx);
    const isCurrent = hasQuery && _trHits[_trCursor] === trueIdx;
    const cls = ["tr-full-entry", isCurrent ? "current-hit" : "", (hasQuery && !isHit) ? "dimmed" : ""].filter(Boolean).join(" ");
    const body = (hasQuery && isHit) ? hlSearch(t.text||"", _trQuery) : esc(t.text||"");
    return `<div class="${cls}" data-idx="${trueIdx}">
      <span class="tr-ts">[${esc(t.timestamp||"")}]</span>
      <span class="tr-body">${body || '<span style="opacity:.4">(silence)</span>'}</span>
    </div>`;
  }).join("");

  if (!hasQuery && tr.length > _trShown) {
    const remaining = tr.length - _trShown;
    html += `<div class="tr-load-more">
      <button class="btn-sm" onclick="loadMoreTr()">Voir ${Math.min(remaining, TR_PAGE)} de plus</button>
      <span class="tr-count-label">${_trShown} / ${tr.length} affichés</span>
    </div>`;
  }
  return html;
}

// ── Panneau détections de la session ─────────────────────────────────────
function buildDetectionsPanel(dets) {
  if (dets.length === 0) {
    return emptyState("Aucune détection dans cette session", "");
  }
  return dets.map((d,i) => `<div class="det-card" style="margin-bottom:10px">
    <div class="det-header">
      <span class="det-time">${esc(d.timestamp||"—")}</span>
      ${d.notification_sent ? '<span style="font-size:.8rem;color:var(--text-secondary)">✉️ Notifié</span>' : ""}
    </div>
    <div class="det-text">${esc(d.extracted_info||"(sans info)")}</div>
    <div class="confidence-row" style="margin-top:8px">
      <div class="conf-bar-outer">
        <div class="conf-bar-inner" style="width:${d.confidence||0}%;background:${confColor(d.confidence||0)}"></div>
      </div>
      ${confBadge(d.confidence||0)}
    </div>
    ${(d.transcription_context||"").trim() ? `
      <button class="btn-ctx" onclick="toggleSessDetCtx(${i})">▶ Contexte complet</button>
      <div class="det-ctx" id="sdc-${i}">${esc(d.transcription_context)}</div>` : ""}
  </div>`).join("");
}

// ── Recherche dans la transcription ──────────────────────────────────────
function computeTrHits() {
  if (!_trQuery || _detailIdx < 0) {
    _trHits    = [];
    _trHitsSet = new Set();
    return;
  }
  const tr  = _allSessions[_detailIdx].full_transcript || [];
  _trHits   = [];
  for (let i = 0; i < tr.length; i++) {
    if ((tr[i].text || "").toLowerCase().includes(_trQuery)) _trHits.push(i);
  }
  _trHitsSet = new Set(_trHits);
}

function onTrSearch(q) {
  _trQuery  = q.trim().toLowerCase();
  _trCursor = 0;
  _trShown  = TR_PAGE;
  computeTrHits();
  rerenderTrContent();
  // Update toolbar controls
  const clr = document.getElementById("tr-clr");
  if (clr) clr.style.display = _trQuery ? "block" : "none";
}

function clearTrSearch() {
  const inp = document.getElementById("tr-search");
  if (inp) inp.value = "";
  onTrSearch("");
}

function navigateTrHit(dir) {
  if (_trHits.length === 0) return;
  _trCursor = Math.max(0, Math.min(_trHits.length - 1, _trCursor + dir));
  rerenderTrContent();
}

function loadMoreTr() {
  _trShown += TR_PAGE;
  rerenderTrContent();
}

function rerenderTrContent() {
  if (_detailIdx < 0) return;
  const tr  = _allSessions[_detailIdx].full_transcript || [];
  const cnt = document.getElementById("tr-full-content");
  if (cnt) cnt.innerHTML = buildTrEntries(tr);

  // Update hit count label
  const hitEl  = document.getElementById("hit-count");
  const prevEl = document.getElementById("tr-prev");
  const nextEl = document.getElementById("tr-next");
  if (hitEl) {
    if (!_trQuery) {
      hitEl.style.visibility = "hidden";
    } else {
      hitEl.style.visibility = "";
      hitEl.textContent = _trHits.length === 0 ? "Aucun résultat" : `${_trCursor+1} / ${_trHits.length}`;
    }
  }
  if (prevEl) prevEl.disabled = !_trQuery || _trHits.length === 0 || _trCursor === 0;
  if (nextEl) nextEl.disabled = !_trQuery || _trHits.length === 0 || _trCursor >= _trHits.length - 1;

  // Scroll to current hit
  if (_trHits.length > 0) {
    const currentIdx = _trHits[_trCursor];
    const el = document.querySelector(`.tr-full-entry[data-idx="${currentIdx}"]`);
    if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
}

// ── Actions transcription ─────────────────────────────────────────────────
function copyAllTranscript() {
  if (_detailIdx < 0) return;
  const tr   = _allSessions[_detailIdx].full_transcript || [];
  const text = tr.map(t => `[${t.timestamp||""}] ${t.text||""}`).join("\n");
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("btn-copy-all");
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = "✓ Copié";
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }
  }).catch(() => {});
}

function downloadTranscript() {
  if (_detailIdx < 0) return;
  const s    = _allSessions[_detailIdx];
  const tr   = s.full_transcript || [];
  const sep  = "─".repeat(60);
  const header = `Radio Nova Watcher — Transcription du ${s.date}\nSession : ${s.start_time||""} → ${s.end_time||""}\nDurée : ${fmtDur(s.duration_minutes||0)} · ${s.chunks_processed||0} chunks\n${sep}\n\n`;
  const body   = tr.map(t => `[${t.timestamp||""}] ${t.text||""}`).join("\n");
  const blob   = new Blob([header + body], { type: "text/plain;charset=utf-8" });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement("a");
  a.href = url; a.download = `transcription-${s.date||"session"}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Chart ─────────────────────────────────────────────────────────────────
function renderChart(sessions) {
  const vis = sessions.slice(0,12).reverse();
  if (!vis.length) return `<div class="card">${emptyState("Pas encore de données","")}</div>`;
  const maxCh  = Math.max(...vis.map(s => s.chunks_processed||0), 1);
  const maxDet = Math.max(...vis.map(s => (s.detections||[]).length), 1);

  const bars = vis.map(s => {
    const ch  = s.chunks_processed||0;
    const det = (s.detections||[]).length;
    const hCh  = Math.max(3, Math.round((ch/maxCh)*82));
    const hDet = Math.max(det?3:0, Math.round((det/maxDet)*82));
    const lbl  = (s.date||"").slice(5);
    return `<div class="bar-group">
      <div class="bars">
        <div class="bar bar-chunks" style="height:2px" data-h="${hCh}" title="${ch} chunks">
          <span class="bar-val">${ch}</span>
        </div>
        <div class="bar bar-detections" style="height:2px" data-h="${hDet}" title="${det} détections">
          <span class="bar-val">${det}</span>
        </div>
      </div>
      <div class="bar-label">${esc(lbl)}</div>
    </div>`;
  }).join("");

  return `<div class="card">
    <div class="chart-wrap"><div class="chart">${bars}</div></div>
    <div class="chart-legend">
      <span><span class="legend-dot" style="background:var(--border)"></span>Chunks traités</span>
      <span><span class="legend-dot" style="background:var(--text-secondary);opacity:.65"></span>Détections</span>
    </div>
  </div>`;
}

// ── Détection (timeline globale) ──────────────────────────────────────────
function renderDetection(d, i) {
  const c = d.confidence||0;
  const hasCtx = (d.transcription_context||"").trim();
  return `<div class="det-entry" id="det-${i}">
    <div class="det-dot${d.notification_sent ? " confirmed" : ""}"></div>
    <div class="det-card">
      <div class="det-header">
        <span class="det-time">${esc(d.timestamp||"—")}</span>
        <span class="det-session-label">Session du ${fmtDate(d.session_date)}</span>
        ${d.notification_sent ? '<span class="badge badge-detected">Notifié</span>' : ""}
      </div>
      <div class="det-text">${esc(d.extracted_info||"(sans info)")}</div>
      <div class="confidence-row">
        <div class="conf-bar-outer">
          <div class="conf-bar-inner" style="width:0;background:${confColor(c)}" data-width="${c}"></div>
        </div>
        ${confBadge(c)}
      </div>
      ${hasCtx ? `<button class="btn-ctx" onclick="toggleCtx(${i})">▶ Contexte complet</button>
        <div class="det-ctx" id="ctx-${i}">${esc(d.transcription_context)}</div>` : ""}
    </div>
  </div>`;
}

// ── Empty state ───────────────────────────────────────────────────────────
function emptyState(title, sub) {
  return `<div class="empty-state">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="26" stroke="currentColor" stroke-width="1.5"/>
      <path d="M24 32h16M30 24l8 8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p><strong>${esc(title)}</strong></p>
    ${sub ? `<p style="margin-top:6px;font-size:.79rem">${esc(sub)}</p>` : ""}
  </div>`;
}

// ── Interactions ──────────────────────────────────────────────────────────
function toggleCtx(i) {
  const ctx = document.getElementById(`ctx-${i}`);
  const btn = ctx.previousElementSibling;
  const open = ctx.classList.toggle("open");
  btn.textContent = open ? "▼ Masquer le contexte" : "▶ Contexte complet";
}

function toggleSessDetCtx(i) {
  const ctx = document.getElementById(`sdc-${i}`);
  const btn = ctx.previousElementSibling;
  const open = ctx.classList.toggle("open");
  btn.textContent = open ? "▼ Masquer le contexte" : "▶ Contexte complet";
}

// ── Chargement ────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById("loader").style.display = "block";
  document.getElementById("content").innerHTML = skeletonHTML();
  document.getElementById("content").style.opacity = ".35";
  document.getElementById("error-box").style.display = "none";

  if (GIST_RAW_URL && GIST_RAW_URL !== "GIST_RAW_URL_PLACEHOLDER") {
    try {
      const resp = await fetch(GIST_RAW_URL + "?t=" + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      localStorage.setItem(LS_KEY, JSON.stringify(data));
      finish(data, false);
      return;
    } catch(e) { console.warn("Gist fetch failed:", e); }
  }

  const cached = localStorage.getItem(LS_KEY);
  if (cached) {
    try { finish(JSON.parse(cached), true); return; } catch(_) {}
  }

  document.getElementById("loader").style.display = "none";
  document.getElementById("content").innerHTML = "";
  document.getElementById("content").style.opacity = "1";
  const box = document.getElementById("error-box");
  box.style.display = "flex";
  document.getElementById("error-msg").textContent = GIST_RAW_URL === "GIST_RAW_URL_PLACEHOLDER"
    ? "⚙️ Dashboard non encore configuré — lancez une première session avec GIST_ENABLED=true."
    : "Impossible de charger les données. Vérifiez que le Gist est accessible.";
  render({ sessions: [] });
}

function finish(data, fromCache) {
  document.getElementById("loader").style.display = "none";
  document.getElementById("content").style.opacity = "1";
  if (fromCache) {
    const box = document.getElementById("error-box");
    box.style.display = "flex";
    document.getElementById("error-msg").textContent = "⚠️ Données depuis le cache local — Gist inaccessible.";
  }
  render(data);
}

// ── Init ──────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
